<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my favorit music gweh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        .apple-blur {
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            background-color: rgba(10, 10, 10, 0.75);
        }
        .nav-active {
            color: #ff2d55;
        }
        .apple-card-shadow {
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

</head>
<body class="bg-black text-white pb-32 md:pb-10">

    <!-- DESKTOP HEADER -->

        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-gradient-to-tr from-rose-500 to-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-rose-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>

        </div>

        </nav>
        <div class="w-24"></div> 
    </header>

        <!-- SECTION: DENGARKAN SEKARANG -->
        <section id="dengarkan" class="mb-20">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-2">playlist gweh</h1>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">

                <a href="https://open.spotify.com/playlist/37i9dQZF1DX5eq3AONkaho?si=_JkWmiSZQAmCdBJc9ldwUw" target="_blank" class="group block">
                    <div class="relative overflow-hidden rounded-[2rem] aspect-square apple-card-shadow transition-all duration-500 group-hover:scale-[1.04]">
                        <img src="https://is1-ssl.mzstatic.com/image/thumb/Music221/v4/df/26/ea/df26eafa-06e8-8bd0-4180-5ba91fb91c39/888735953859.png/632x632bb.webp" alt="Kerja" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <p class="text-white/70 text-xs font-bold uppercase tracking-[0.2em] mb-1">Playlist</p>
                            <h3 class="text-white font-black text-2xl leading-tight"> WORK FOCUS</h3>
                        </div>
                    </div>

                <!-- Playlist 2 -->

                    <div class="relative overflow-hidden rounded-[2rem] aspect-square apple-card-shadow transition-all duration-500 group-hover:scale-[1.04]">
                        <img src="https://image-cdn-ak.spotifycdn.com/image/ab67706c0000da84f122999ffd95ad3703c56dd2" alt="Drive" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-indigo-950/90 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <p class="text-white/70 text-xs font-bold uppercase tracking-[0.2em] mb-1">Playlist</p>
                            <h3 class="text-white font-black text-2xl leading-tight">PERJALANAN JAUH</h3>
                        </div>
                    </div>
                </a>

                <!-- Playlist 3 -->
                <a href="https://open.spotify.com/playlist/1hiHhf1rIrvDgBN4nmpOsR?si=OEvnOE3jSiWtGxqSHRhVvg" target="_blank" class="group block">
                    <div class="relative overflow-hidden rounded-[2rem] aspect-square apple-card-shadow transition-all duration-500 group-hover:scale-[1.04]">
                        <img src="https://cdn-images.dzcdn.net/images/cover/84f4cfd45cc49c8f5e1c9a790214ec06/1200x1200-000000-81-0-0.webp" alt="Tidur" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-blue-950/90 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <p class="text-white/70 text-xs font-bold uppercase tracking-[0.2em] mb-1">Playlist</p>
                            <h3 class="text-white font-black text-2xl leading-tight">BUATT BOBO</h3>
                        </div>
                    </div>
                </a>

                <!-- Playlist 4 -->
                <a href="https://open.spotify.com/playlist/37i9dQZF1DWSnRSDTCsoPk?si=yf43JTRITKSfYpV5qcYXYA" target="_blank" class="group block">
                    <div class="relative overflow-hidden rounded-[2rem] aspect-square apple-card-shadow transition-all duration-500 group-hover:scale-[1.04]">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS04_GydwyPi9uAczDgt9mMi2p4_R0oUzQlPD7w35cn1Q&s=10" alt="Dance" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-rose-950/90 via-black/20 to-transparent"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <p class="text-white/70 text-xs font-bold uppercase tracking-[0.2em] mb-1">Playlist</p>
                            <h3 class="text-white font-black text-2xl leading-tight">DANCER DADAKAN</h3>
                        </div>
                    </div>
                </a>
            </div>
        </section>

        <!-- SECTION: ARTIS FAVORIT -->
        <section id="artis" class="mb-40">
            <h2 class="text-3xl font-black tracking-tight mb-10">artis fav gweh</h2>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-y-12 gap-x-8">
                <!-- Artist Script -->
                <script>
                    const artists = [
                        { name: 'JENNIE', img: 'https://files.catbox.moe/hz2a1g.jpg' },
                        { name: 'BLACKPINK', img: 'https://files.catbox.moe/2ivtvu.jpg' },
                        { name: 'ROSÉ', img: 'https://files.catbox.moe/4hgylx.jpg' },
                        { name: 'LISA', img: 'https://files.catbox.moe/cv19zo.jpg' },
                        { name: 'JISOO', img: 'https://files.catbox.moe/2e5ygo.jpg' },
                        { name: 'LE SSERAFIM', img: 'https://files.catbox.moe/xehuay.jpg' },
                        { name: 'ALLDAY PROJECT', img: 'https://files.catbox.moe/bqlvod.jpg' },
                        { name: 'ILLIT', img: 'https://files.catbox.moe/ri17uu.jpg' },
                        { name: 'CORTIS', img: 'https://files.catbox.moe/u4wbl7.jpg' },
                        { name: 'HEARTS2HEARTS', img: 'https://files.catbox.moe/asdamr.jpg' },
                        { name: 'BABYMONSTER', img: 'https://files.catbox.moe/lp8nsy.jpg' },
                        { name: 'TREASURE', img: 'https://files.catbox.moe/uzgz0l.jpg' }
                    ];

                    const container = document.currentScript.parentElement;
                    artists.forEach(artist => {
                        const a = document.createElement('a');
                        a.href = `https://open.spotify.com/search/${encodeURIComponent(artist.name)}`;
                        a.target = "_blank";
                        a.className = 'flex flex-col items-center group cursor-pointer text-center';
                        a.innerHTML = `
                            <div class="w-full aspect-square rounded-full mb-5 shadow-2xl transition-all duration-500 group-hover:scale-105 border-[3px] border-white/10 group-hover:border-rose-500/50 overflow-hidden relative">
                                <img src="${artist.img}" alt="${artist.name}" class="absolute inset-0 w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-500">
                                <div class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors"></div>
                            </div>
                            <span class="text-[15px] font-extrabold tracking-tight group-hover:text-rose-500 transition-colors uppercase italic">${artist.name}</span>
                        `;
                        container.appendChild(a);
                    });
                </script>
            </div>
        </section>
    </main>

    <!-- MOBILE BOTTOM NAVIGATION (Apple Style) -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 apple-blur border-t border-white/5 pt-5 pb-10 px-6 z-50">
        <div class="flex justify-center gap-28">
            <a href="#dengarkan" class="flex flex-col items-center gap-2 nav-active">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                <span class="text-xs font-black uppercase tracking-wider">Home</span>
            </a>
            <a href="#artis" class="flex flex-col items-center gap-2 text-white/30 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span class="text-xs font-black uppercase tracking-wider">Artist</span>
            </a>
        </div>

</body>
</html>
